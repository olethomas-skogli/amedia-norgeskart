document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;\n  border:1px solid rgba(255,255,255,0.25);\n}\n.stat{display:flex;flex-direction:column;line-height:1}\n.stat-n{font-size:18px;font-weight:700;color:white;letter-spacing:-0.5px}\n.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500}\n.tspace{flex:1}\n.spill{\n  display:flex;align-items:center;gap:7px;\n  background:rgba(255,255,255,0.06);border:1px solid var(--border);\n  border-radius:22px;padding:0 13px;height:32px;\n  transition:border .15s,background .15s;\n}\n.spill:focus-within{background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.4)}\n.spill svg{color:var(--muted);flex-shrink:0}\n.spill input{border:none;outline:none;background:transparent;font:16px 'DM Sans',sans-serif;color:var(--text);width:160px}\n.spill input::placeholder{color:var(--muted)}\n.cnt-lbl{font-size:12px;color:var(--muted);white-space:nowrap}\n.cnt-lbl b{color:var(--text)}\n\n/* PANEL */\n.panel{\n  position:fixed;top:52px;right:0;bottom:0;z-index:800;\n  width:290px;background:rgba(15,17,23,0.97);\n  backdrop-filter:blur(16px);\n  border-left:1px solid var(--border);\n  display:flex;flex-direction:column;\n  transform:translateX(100%);\n  transition:transform .25s cubic-bezier(.4,0,.2,1);\n  box-shadow:-4px 0 24px rgba(0,0,0,.4);\n}\n.panel.open{transform:translateX(0)}\n.phead{padding:10px 13px 8px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:500}\n.psearch{display:none;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}\n.psearch svg{color:var(--muted);flex-shrink:0}\n.psearch input{border:none;outline:none;background:transparent;font:16px 'DM Sans',sans-serif;color:var(--text);width:100%}\n.psearch input::placeholder{color:var(--muted)}\n.rgs{display:flex;flex-wrap:wrap;gap:4px;padding:8px 11px;border-bottom:1px solid var(--border);position:relat rshus\"},{\"name\":\"Åsane Tidende\",\"city\":\"Åsane/Bergen\",\"lat\":60.4578,\"lon\":5.297,\"logo\":\"https://assets.acdn.no/local/v3/publications/www.aasanetidende.no/gfx/small-positive.svg\",\"url\":\"https://www.aasanetidende.no\",\"region\":\"Vestland\"}];\n\nconst pnl = document.getElementById('pnl');\n\n\nconst map = L.map('map', {\n  minZoom: window.innerWidth <= 768 ? 4.5 : 5, maxZoom: 14,\n  maxBounds: L.latLngBounds([55.0,3.5],[72.5,35.0]),\n  maxBoundsViscosity: 0.85,\n  zoomControl: false, attributionControl: false,\n});\nmap.setView(window.innerWidth <= 768 ? [63.5, 15.5] : [65.2, 14.5], window.innerWidth <= 768 ? 4.5 : 5);\nL.control.zoom({ position: 'bottomleft' }).addTo(map);\n\n// Dark map tiles\nL.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {\n  subdomains:'abcd', maxZoom:19\n}).addTo(map);\n\n\nconst PIN_ZOOM = window.innerWidth <= 768 ? 8 : 7;\nlet curZoom = map.getZoom();\n\nfunction makePinIcon(sel) {\n  return L.divIcon({\n    html: `<div class=\"pin${sel?' sel':''}\"><\u002Fdiv>`,\n    className:'', iconSize:[sel?13:11,sel?13:11], iconAnchor:[sel?6:5,sel?6:5], popupAnchor:[0,-8]\n  });\n}\n\nfunction makeLogoIcon(np, sel) {\n  return L.divIcon({\n    html: `<div class=\"lm${sel?' sel':''}\">\n      <img src=\"${np.logo}\" alt=\"\" width=\"68\" height=\"20\" style=\"display:none;width:68px;height:20px;object-fit:contain\"\n        onload=\"this.style.display='block';this.nextElementSibling.style.display='none'\"\n        onerror=\"this.style.display='none'\">\n      <span class=\"lm-txt\">${np.name}<\u002Fspan>\n    <\u002Fdiv>`,\n    className:'', iconSize:[78,30], iconAnchor:[39,30], popupAnchor:[0,-32]\n  });\n}\n\nfunction getIcon(np, i, zoom) {\n  const sel = active === i;\n  return zoom < PIN_ZOOM ? makePinIcon(sel) : makeLogoIcon(np, sel);\n}\n\nconst markers = {};\nlet active = null;\n\nNP.forEach((np, i) => {\n  const m = L.marker([np.lat, np.lon], { icon: getIcon(np, i, curZoom) });\n  m.bindPopup(() => `<div class=\"pu\">\n    <div class=\"pulogo\">\n      <img src=\"${np.logo}\" alt=\"\" width=\"68\" height=\"20\" style=\"display:none;width:68px;height:20px;object-fit:contain\" class=\"${['www.nordhordland.no','www.ba.no','www.gbnett.no','www.kv.no'].some(d=>np.logo.includes(d))? 'no-filter' : ''}\"\n        onload=\"this.style.display='block';this.nextElementSibling.style.display='none'\"\n        onerror=\"this.style.display='none'\">\n      <span class=\"pulogtxt\">${np.name}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"puname\">${np.name}<\u002Fdiv>\n    <div class=\"pucity\">${np.city} · ${np.region}<\u002Fdiv>\n    <a class=\"pulink\" href=\"${np.url}\" target=\"_blank\">Besøk nettavis ↗<\u002Fa>\n  <\u002Fdiv>`, {maxWidth:240,minWidth:180});\n  m.on('click', () => select(i, false));\n  markers[i] = m;\n  m.addTo(map);\n});\n\nmap.on('zoomend', () => {\n  curZoom = map.getZoom();\n  NP.forEach((np, i) => markers[i]?.setIcon(getIcon(np, i, curZoom)));\n});\n\n// Mobile search toggle\n\n\nfunction select(i, fly) {\n  if (active !== null) {\n    markers[active]?.setIcon(getIcon(NP[active], active, curZoom));\n    document.querySelector(`.nitem[data-i=\"${active}\"]`)?.classList.remove('active');\n  }\n  active = i;\n  markers[i]?.setIcon(getIcon(NP[i], i, curZoom));\n  document.querySelector(`.nitem[data-i=\"${i}\"]`)?.classList.add('active');\n  document.querySelector(`.nitem[data-i=\"${i}\"]`)?.scrollIntoView({block:'nearest'});\n  if (fly) map.flyTo([NP[i].lat, NP[i].lon], Math.max(curZoom, PIN_ZOOM+2), {duration:0.8});\n  setTimeout(() => markers[i]?.openPopup(), fly ? 900 : 0);\n}\n\nconst regions = ['Alle',...[...new Set(NP.map(n=>n.region).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'no'))];\nlet curRegion='Alle', curQ='';\nregions.forEach(r => {\n  const b=document.createElement('button');\n  b.className='rbtn'+(r==='Alle'?' on':'');\n  b.textContent=r;\n  function doRegion(){ window._regionClickedAt = Date.now(); if(curRegion===r && r!=='Alle'){ curRegion='Alle'; document.querySelectorAll('.rbtn').forEach(function(x){ x.classList.remove('on'); if(x.textContent==='Alle') x.classList.add('on'); }); renderList(); map.flyTo([65.5,15.5],5,{duration:1}); } else { curRegion=r; document.querySelectorAll('.rbtn').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); if(active!==null){ markers[active]?.setIcon(getIcon(NP[active],active,curZoom)); map.closePopup(); active=null; } renderList(); flyToRegion(r); } } b.addEventListener('touchend', function(e){ e.preventDefault(); doRegion(); }, { passive: false }); b.addEventListener('click', function(e){ if(window._regionClickedAt && Date.now()-window._regionClickedAt < 500) return; doRegion(); });\n  document.getElementById('rgs').appendChild(b);\n});\n\nfunction flyToRegion(region) {\n  var views = {\n    'Agder':          [58.4628, 8.5103,  9],\n    'Akershus':       [59.9708, 11.1443, 9],\n    'Buskerud':       [59.9065, 10.2166, 10],\n    'Finnmark':       [70.3391, 24.5490, 7],\n    'Innlandet':      [61.0337, 10.8064, 9],\n    'M\u00f8re og Romsdal':[62.8924, 8.1484,  10],\n    'Nordland':       [67.5652, 16.3202, 7],\n    'Oslo':           [59.9217, 10.7627, 12],\n    'Rogaland':       [58.9068, 6.1208,  9],\n    'Telemark':       [59.4095, 9.2821,  9],\n    'Troms':          [69.0303, 17.3337, 8],\n    'Tr\u00f8ndelag':      [63.8733, 11.6977, 8],\n    'Vestfold':       [59.3076, 10.2605, 10],\n    'Vestland':       [60.6772, 8.7314,  8],\n    '\u00d8stfold':        [59.3531, 11.0213, 10]\n  };\n  var v = views[region];\n  if (v) { map.flyTo([v[0], v[1]], v[2], {duration: 1}); }\n}\nfunction renderList() {\n  const list=document.getElementById('nlist');\n  list.innerHTML=''; let n=0;\n  NP.forEach((np,i) => {\n    if (curQ && !np.name.toLowerCase().includes(curQ) && !np.city.toLowerCase().includes(curQ)) { markers[i]?.setOpacity(0); return; }\n    if (curRegion!=='Alle' && np.region!==curRegion) { markers[i]?.setOpacity(0); return; }\n    markers[i]?.setOpacity(1); n++;\n    const el=document.createElement('div');\n    el.className='nitem'+(active===i?' active':'');\n    el.dataset.i=i;\n    el.innerHTML=`<div class=\"lcell\"><img src=\"${np.logo}\" alt=\"\" width=\"68\" height=\"20\" style=\"width:68px;height:20px;object-fit:contain\" loading=\"eager\" onerror=\"this.style.display='none';this.nextElementSibling.style.display='inline'\"><span class=\"lbadge\">${np.name}<\u002Fspan><\u002Fdiv><div class=\"ninfo\"><div class=\"nname\">${np.name}<\u002Fdiv><div class=\"ncity\">${np.city}<\u002Fdiv><\u002Fdiv>`;\n    el.addEventListener('click', function(e){ if(window._regionClickedAt && Date.now() - window._regionClickedAt < 500) return; select(i,true); });\n    list.appendChild(el);\n  });\n  document.getElementById('cnt').textContent=n;\n}\n\ndocument.getElementById('home-btn').onclick = () => { map.flyTo([65.5, 15.5], 5, {duration:1}); };\nfunction locateAndZoom(onSuccess) {\n  if (!navigator.geolocation) return;\n  navigator.geolocation.getCurrentPosition(function(pos) {\n    var lat = pos.coords.latitude;\n    var lon = pos.coords.longitude;\n    // Find closest region by finding nearest newspaper\n    var best = null, bestDist = Infinity;\n    NP.forEach(function(n) {\n      var d = Math.pow(n.lat - lat, 2) + Math.pow(n.lon - lon, 2);\n      if (d < bestDist) { bestDist = d; best = n; }\n    });\n    if (best && best.region) {\n      curRegion = best.region;\n      document.querySelectorAll('.rbtn').forEach(function(x) { x.classList.remove('on'); });\n      document.querySelectorAll('.rbtn').forEach(function(x) { if (x.textContent === curRegion) x.classList.add('on'); });\n      renderList();\n      flyToRegion(curRegion);\n    } else {\n      map.flyTo([lat, lon], 10, {duration:1.5});\n    }\n    if (onSuccess) onSuccess();\n  }, function() {});\n}\ndocument.getElementById('gps-btn').onclick = function() { locateAndZoom(); };\n\nif (window.innerWidth <= 768) {\n  setTimeout(function(){ locateAndZoom(); }, 2000);\n}\nvar qEl=document.getElementById('q');\nvar _panelJustOpened = false;\nvar pqEl = document.getElementById('pq');\nif(window.innerWidth <= 768){\n  document.getElementById('spill-trigger').addEventListener('click', function(){\n    pnl.classList.add('open');\n    _panelJustOpened = true;\n    setTimeout(function(){ _panelJustOpened = false; }, 350);\n    setTimeout(function(){ if(pqEl) pqEl.focus(); }, 300);\n  });\n} // panel always open on desktop\nif(pqEl){\n  pqEl.addEventListener('input', function(e){\n    var v = e.target.value.toLowerCase();\n    qEl.value = e.target.value;\n    clearTimeout(_debTimer);\n    _debTimer = setTimeout(function(){ curQ = v; renderList(); }, 150);\n  });\n}\nvar _debTimer; qEl.oninput=function(e){ clearTimeout(_debTimer); var v=e.target.value.toLowerCase(); _debTimer=setTimeout(function(){ curQ=v; renderList(); }, 150); };\ndocument.addEventListener('click', function(e){ if(!e.target.closest('.panel') && !e.target.closest('.spill')){ pnl.classList.remove('open'); curQ=''; qEl.value=''; if(pqEl) pqEl.value=''; renderList(); } });\ndocument.addEventListener('keydown', function(e){ if(e.key==='Escape'){ pnl.classList.remove('open'); curQ=''; qEl.value=''; if(pqEl) pqEl.value=''; renderList(); qEl.blur(); } });\nrenderList();\n// Auto-hide statscard on mobile after 4s\nif (window.innerWidth <= 768) {\n  setTimeout(function() {\n    var sc = document.getElementById('statscard');\n    if (sc) { sc.style.transition='opacity 0.5s'; sc.style.opacity='0'; sc.style.pointerEvents='none'; }\n  }, 4000);\n}\n\n/* Drag-to-dismiss bottom sheet on mobile */\nif (window.innerWidth <= 768) {\n  var pnlEl = document.querySelector(\".panel\");\n  var dragStartY = 0;\n  var dragCurrentY = 0;\n  var isDragging = false;\n\n  pnlEl.addEventListener(\"touchstart\", function(e) {\n    if (e.target.closest(\".nlist-wrap, input\")) return;\n    dragStartY = e.touches[0].clientY;\n    isDragging = true;\n    pnlEl.classList.add(\"no-transition\");\n  }, { passive: true });\n\n  pnlEl.addEventListener(\"touchmove\", function(e) {\n    if (!isDragging) return;\n    dragCurrentY = e.touches[0].clientY;\n    var dy = dragCurrentY - dragStartY;\n    if (dy > 0) { pnlEl.style.transform = \"translateY(\" + dy + \"px)\"; }\n  }, { passive: true });\n\n  pnlEl.addEventListener(\"touchend\", function() {\n    if (!isDragging) return;\n    isDragging = false;\n    pnlEl.classList.remove(\"no-transition\");\n    var dy = dragCurrentY - dragStartY;\n    if (dy > 80) {\n      pnlEl.style.transform = \"\";\n      var pt2 = document.querySelector(\".ptoggle\");\n      pnlEl.classList.remove(\"open\");\n      pnlEl.classList.remove(\"expanded\");\n      if (pt2) pt2.classList.remove(\"open\");\n    } else if (dy < -60) {\n      pnlEl.style.transform = \"\";\n      pnlEl.classList.add(\"expanded\");\n    } else {\n      pnlEl.style.transform = \"\";\n    }\n    dragCurrentY = 0; dragStartY = 0;\n  });\n}"
